<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" fill="currentColor">
  <!-- Volvo-style coach silhouette (more angular/boxy) -->
  <path d="M6 38 L6 16 C6 12, 10 10, 14 10 L100 10 C106 10, 112 14, 112 18 L112 34 C112 37, 110 38, 108 38 Z" opacity="0.92"/>
  <!-- Flat windshield (Volvo style) -->
  <path d="M100 12 L110 12 C112 12, 112 16, 112 18 L112 30 L100 30 Z" fill="#fff" opacity="0.25"/>
  <!-- Side windows (taller, more squared) -->
  <rect x="16" y="13" width="12" height="13" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="31" y="13" width="12" height="13" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="46" y="13" width="12" height="13" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="61" y="13" width="12" height="13" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="76" y="13" width="12" height="13" rx="1.5" fill="#fff" opacity="0.2"/>
  <!-- Body line -->
  <rect x="8" y="30" width="102" height="3" rx="1" fill="#fff" opacity="0.1"/>
  <!-- Wheels -->
  <circle cx="26" cy="40" r="6" fill="#23272f"/>
  <circle cx="26" cy="40" r="3" fill="#444"/>
  <circle cx="96" cy="40" r="6" fill="#23272f"/>
  <circle cx="96" cy="40" r="3" fill="#444"/>
  <!-- Headlights (rectangular, Volvo style) -->
  <rect x="112" y="20" width="3" height="4" rx="1" fill="#fff" opacity="0.35"/>
  <rect x="112" y="26" width="3" height="4" rx="1" fill="#fff" opacity="0.35"/>
</svg>
