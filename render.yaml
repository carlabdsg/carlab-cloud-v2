services:
  - type: web
    name: carlab-cloud-v2
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carlab-cloud-v2-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Administrador Carlab
      - key: ADMIN_EMAIL
        value: admin@carlab.local
      - key: ADMIN_PASSWORD
        value: Admin123*

databases:
  - name: carlab-cloud-v2-db
    plan: free
    databaseName: carlab_cloud_v2
    user: carlab
