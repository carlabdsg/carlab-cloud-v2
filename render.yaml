services:
  - type: web
    name: carlab-cloud-v2
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_NAME
        value: Administrador Carlab
      - key: ADMIN_EMAIL
        value: admin@carlab.local
      - key: ADMIN_PASSWORD
        value: Admin123*
